name: Tests

on:
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: projects/daycareconnect

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: daycare_connect
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/daycare_connect
      NODE_ENV: test
      BETTER_AUTH_SECRET: ci-test-secret-key
      BETTER_AUTH_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_fake
      STRIPE_WEBHOOK_SECRET: whsec_fake

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: projects/daycareconnect/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:push

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start API server
        run: pnpm dev:api &

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: projects/daycareconnect/playwright-report/
          retention-days: 7
